# Default DiffuJudge-AV configuration.
# Loaded by Hydra; override at the CLI:
#   python scripts/run_inference.py judges@_global_=mock_ensemble seed=99

name: diffujudge-av-default
seed: 42
score_scale: 5
output_dir: ./outputs

judges:
  - name: qwen2.5-vl-7b
    backend: vllm
    model: Qwen/Qwen2.5-VL-7B-Instruct
    temperature: 0.0
  - name: internvl2-8b
    backend: vllm
    model: OpenGVLab/InternVL2-8B
    temperature: 0.0
  - name: llava-critic-7b
    backend: vllm
    model: lmms-lab/llava-critic-7b
    temperature: 0.0

perturbations:
  enable_option_swap: true
  enable_rubric_paraphrase: true
  enable_criterion_reorder: true
  enable_score_id_swap: true
  enable_temperature_noise: true
  enable_exemplar_resample: true
  enable_frame_shuffle: true
  samples_per_level: 3
  paraphrase_variants: 3
  temperature_grid: [0.0, 0.3, 0.7]
  score_id_formats: [arabic, roman, alpha]

tweedie:
  mode: analytical
  kde_bandwidth: scott
  score_min: 1.0
  score_max: 5.0
  score_grid_points: 256

conformal:
  alpha: 0.10
  method: ordinal_boundary
  score_classes: [1, 2, 3, 4, 5]

data:
  dataset: lingoqa
  data_dir: ./data/lingoqa
  n_items: 200
  n_frames_per_clip: 6
  frame_sampler: uniform

golden_set:
  tier1_lingo_judge_threshold: 0.8
  tier2_supermajority_kappa: 0.8
  tier3_manual_target: 50
  calibration_split: 0.6

eval:
  seeds: [13, 17, 23, 31, 47]
